<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Automatic Posting</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Automatic Posting</h1>
          <p>Instagram Business, Threads, Kakao 공식 채널용 발행 도구</p>
        </div>
        <button id="refreshJobs" type="button">작업 새로고침</button>
      </header>

      <section class="panel">
        <div class="sectionHead">
          <h2>계정 연결</h2>
          <span class="muted">앱 설정값이 준비되면 여기서 사용자가 승인만 진행합니다.</span>
        </div>
        <div id="accountConnections" class="connections">연결 상태를 확인하고 있습니다.</div>
      </section>

      <section class="panel">
        <div class="sectionHead">
          <h2>시스템 준비 상태</h2>
          <span class="muted">Cloudflare DB, 이미지 저장소, 보안 키 연결 상태를 확인합니다.</span>
        </div>
        <div id="systemReadiness" class="readinessGrid">준비 상태를 확인하고 있습니다.</div>
      </section>

      <section class="panel">
        <div class="sectionHead">
          <h2>관리자 설정</h2>
          <span class="muted">Meta App 값은 준비되는 시점에 여기서 저장합니다.</span>
        </div>
        <form id="adminSettingsForm" class="adminSettings">
          <div class="grid">
            <label>
              관리자 설정 키
              <input name="admin_key" type="password" autocomplete="current-password" />
            </label>
            <label>
              Meta App ID
              <input name="meta_app_id" autocomplete="off" />
            </label>
          </div>
          <label>
            Meta App Secret
            <input name="meta_app_secret" type="password" autocomplete="new-password" />
          </label>
          <button type="submit">설정 저장</button>
          <div id="adminSettingsStatus" class="settingsStatus">설정 상태를 확인하고 있습니다.</div>
        </form>
      </section>

      <section class="panel">
        <h2>게시글 작성</h2>
        <form id="postForm">
          <label>
            제목
            <input name="title" required maxlength="120" />
          </label>
          <label>
            본문
            <textarea name="body" required rows="7"></textarea>
          </label>
          <div class="grid">
            <label>
              링크
              <input name="link_url" type="url" placeholder="https://example.com" />
            </label>
            <label>
              해시태그
              <input name="hashtags" placeholder="#campaign #update" />
            </label>
          </div>
          <div class="imagePicker">
            <label>
              이미지
              <input id="imageFile" name="image_file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
            </label>
            <input name="image_key" type="hidden" />
            <input name="image_url" type="hidden" />
            <div id="imagePreview" class="imagePreview">선택된 이미지가 없습니다.</div>
          </div>
          <fieldset>
            <legend>플랫폼</legend>
            <label><input type="checkbox" name="platforms" value="instagram" checked /> Instagram</label>
            <label><input type="checkbox" name="platforms" value="threads" checked /> Threads</label>
            <label><input type="checkbox" name="platforms" value="kakao" /> Kakao</label>
          </fieldset>
          <div class="grid">
            <label>
              발행 모드
              <select name="mode">
                <option value="now">즉시 발행</option>
                <option value="scheduled">예약 발행</option>
              </select>
            </label>
            <label>
              예약 시간
              <input name="scheduled_at" type="datetime-local" />
            </label>
          </div>
          <button type="submit">게시글 저장 및 발행</button>
        </form>
      </section>

      <section class="panel">
        <div class="sectionHead">
          <h2>발행 작업</h2>
          <button id="runScheduler" type="button">예약 작업 실행</button>
        </div>
        <div id="jobs" class="jobs"></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
