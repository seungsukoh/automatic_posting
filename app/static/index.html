<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Automatic Posting MVP</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <h1>Automatic Posting MVP</h1>
        <p>본인 운영 계정 전용 내부 도구. 현재 발행은 Mock Adapter로 검증합니다.</p>
      </div>
      <button id="refreshJobs" class="secondary">결과 새로고침</button>
    </header>

    <section class="panel">
      <h2>게시글 작성</h2>
      <form id="postForm">
        <label>
          제목
          <input name="title" value="신상품 입고 안내" required>
        </label>
        <label>
          본문
          <textarea name="body" required>오늘 오후 2시부터 신상품 판매를 시작합니다.
한정 수량으로 준비되어 조기 품절될 수 있습니다.</textarea>
        </label>
        <label>
          링크
          <input name="link_url" value="https://example.com/campaign">
        </label>
        <label>
          해시태그
          <input name="hashtags" value="#신상품 #이벤트 #브랜드소식">
        </label>
        <div class="image-picker">
          <label>
            이미지
            <input id="imageFile" name="image_file" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
          </label>
          <input name="image_name" type="hidden">
          <div id="imagePreview" class="image-preview">선택된 이미지가 없습니다.</div>
        </div>

        <fieldset>
          <legend>플랫폼</legend>
          <label class="check"><input type="checkbox" name="platforms" value="Instagram" checked> Instagram</label>
          <label class="check"><input type="checkbox" name="platforms" value="Threads" checked> Threads</label>
          <label class="check"><input type="checkbox" name="platforms" value="Kakao"> Kakao 공식 채널</label>
        </fieldset>

        <div class="grid two">
          <label>
            발행 방식
            <select name="mode" id="mode">
              <option value="now">즉시 발행</option>
              <option value="scheduled">예약 발행</option>
            </select>
          </label>
          <label>
            예약 시간
            <input name="scheduled_at" type="datetime-local">
          </label>
        </div>

        <div class="actions">
          <button type="submit">저장 후 발행 작업 생성</button>
          <button type="button" class="secondary" id="runScheduler">예약 작업 실행 확인</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>발행 작업</h2>
      <div id="jobs" class="jobs">아직 작업이 없습니다.</div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
