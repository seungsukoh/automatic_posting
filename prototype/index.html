<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Social Publisher Prototype</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <style>
    :root {
      --bg: #F2F1EC;
      --panel: #FBFAF6;
      --line: #0E275033;
      --text: #0A1A33;
      --muted: #6E7A8F;
      --primary: #0E2750;
      --primary-dark: #0E2750;
      --success: #0E2750;
      --warning: #A8853F;
      --danger: #A8853F;
      --kakao: #C9A86A;
      --threads: #061328;
      --instagram: #DD2A7B;
      --font-sans: "Pretendard Variable", "Pretendard", "Malgun Gothic", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-serif: "Noto Serif KR", Georgia, serif;
      --font-mono: "JetBrains Mono", "D2Coding", Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.75;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px 1fr;
    }

    .sidebar {
      background: #0A1A33;
      color: #F2F1EC;
      padding: 20px 16px;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button {
      width: 100%;
      height: 40px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #F2F1EC;
      text-align: left;
      padding: 0 12px;
      cursor: pointer;
    }

    .nav button.active,
    .nav button:hover {
      background: #1B3A6B;
      color: #FFFFFF;
    }

    main {
      min-width: 0;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 700;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #FFFFFF;
      color: var(--text);
      padding: 0 14px;
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #FFFFFF;
    }

    .btn.primary:hover {
      background: var(--primary-dark);
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(360px, .9fr);
      gap: 18px;
      align-items: start;
    }

    .notice {
      border: 1px solid #0E275066;
      border-radius: 8px;
      background: #C9A86A33;
      color: #0E2750;
      padding: 12px 14px;
      margin-bottom: 18px;
    }

    .notice strong {
      display: block;
      margin-bottom: 4px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 32px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field label {
      color: #0E2750;
      font-weight: 700;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #FFFFFF;
      color: var(--text);
      padding: 10px 12px;
    }

    .field textarea {
      min-height: 150px;
      resize: vertical;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 16px;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .platform {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 104px;
      display: grid;
      gap: 8px;
      background: #FFFFFF;
    }

    .platform input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .platform-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .platform-name {
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 700;
    }

    .platform-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid #0E275033;
      border-radius: 8px;
      flex: 0 0 auto;
    }

    .platform-logo svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .platform-logo.instagram {
      border-color: transparent;
      background:
        radial-gradient(circle at 30% 105%, #FEDA77 0 16%, #F58529 32%, #DD2A7B 56%, #8134AF 78%, #515BD4 100%);
      color: #FFFFFF;
      box-shadow: inset 0 0 0 1px #FFFFFF33;
    }

    .platform-logo.threads {
      background: var(--threads);
      color: #FFFFFF;
    }

    .platform-logo.kakao {
      background: var(--kakao);
      border: 1px solid #A8853F;
      color: #0A1A33;
    }

    .platform-logo path {
      fill: currentColor;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 16px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #FBFAF6;
    }

    .badge.ready {
      color: var(--success);
      border-color: #0E275066;
      background: #0E275014;
    }

    .badge.warning {
      color: var(--warning);
      border-color: #C9A86A66;
      background: #C9A86A33;
    }

    .preview {
      display: grid;
      gap: 12px;
    }

    .preview-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #FFFFFF;
      overflow: hidden;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 44px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    .preview-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .image-placeholder {
      aspect-ratio: 4 / 3;
      width: 100%;
      border: 1px dashed #0E275066;
      border-radius: 6px;
      background: #FBFAF6;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 16px;
    }

    .preview-text {
      min-height: 54px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
    }

    .result-table th,
    .result-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    .result-table th {
      color: #0E2750;
      font-size: 16px;
    }

    .status {
      font-weight: 700;
    }

    .status.success {
      color: var(--success);
    }

    .status.pending {
      color: var(--warning);
    }

    .status.failed {
      color: var(--danger);
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      min-width: 260px;
      max-width: 420px;
      border: 1px solid #0E275066;
      border-radius: 8px;
      background: #0E275014;
      color: #0E2750;
      padding: 12px 14px;
      box-shadow: 0 12px 30px #0A1A3324;
      display: none;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      main {
        padding: 16px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .platform-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        width: 100%;
      }

      .btn {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Social Publisher</div>
      <nav class="nav" aria-label="주 메뉴">
        <button class="active">게시물 작성</button>
        <button>예약 게시</button>
        <button>게시 이력</button>
        <button>계정</button>
        <button>설정</button>
      </nav>
    </aside>

    <main>
      <div class="topbar">
        <h1>게시물 작성 및 게시</h1>
        <div class="actions">
          <button class="btn" id="saveDraft">임시 저장</button>
          <button class="btn" id="schedulePost">예약 게시</button>
          <button class="btn primary" id="publishNow">바로 게시</button>
        </div>
      </div>

      <div class="notice">
        <strong>1차 범위: 본인 운영 계정 전용</strong>
        Instagram, Threads, Kakao 공식 계정 중 본인이 소유하거나 운영 권한을 가진 계정만 연결합니다.
      </div>

      <div class="workspace">
        <div>
          <section class="section">
            <h2>콘텐츠</h2>
            <div class="field">
              <label for="postTitle">제목</label>
              <input id="postTitle" type="text" value="6월 신상품 입고 안내">
            </div>
            <div class="field">
              <label for="postBody">본문</label>
              <textarea id="postBody">오늘 오후 2시부터 신상품 판매를 시작합니다.

한정 수량으로 준비되어 조기 품절될 수 있습니다.</textarea>
              <div class="meta-row">
                <span id="bodyCount">0자</span>
                <span>원본 콘텐츠</span>
              </div>
            </div>
            <div class="field">
              <label for="linkUrl">링크</label>
              <input id="linkUrl" type="url" value="https://example.com/campaign">
            </div>
            <div class="field">
              <label for="hashtags">해시태그</label>
              <input id="hashtags" type="text" value="#신상품 #이벤트 #브랜드소식">
            </div>
            <div class="field">
              <label for="assetName">이미지</label>
              <input id="assetName" type="file" accept="image/*">
            </div>
          </section>

          <section class="section">
            <h2>플랫폼</h2>
            <div class="platform-grid">
              <label class="platform">
                <div class="platform-header">
                  <span class="platform-name"><span class="platform-logo instagram" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path fill-rule="evenodd" clip-rule="evenodd" d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5ZM12 7.25a4.75 4.75 0 1 0 0 9.5 4.75 4.75 0 0 0 0-9.5Zm0 2a2.75 2.75 0 1 1 0 5.5 2.75 2.75 0 0 1 0-5.5Zm5.25-2.25a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Z"></path></svg></span>Instagram</span>
                  <input type="checkbox" data-platform="Instagram" checked>
                </div>
                <span class="badge ready">연결됨</span>
                <span class="meta-row">Business 계정</span>
              </label>
              <label class="platform">
                <div class="platform-header">
                  <span class="platform-name"><span class="platform-logo threads" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M12.19 24h-.01c-3.58-.02-6.33-1.2-8.18-3.51C2.35 18.44 1.5 15.59 1.47 12.01v-.02c.03-3.58.88-6.43 2.53-8.48C5.85 1.2 8.6.02 12.18 0h.01c2.75.02 5.04.73 6.83 2.1 1.68 1.29 2.86 3.13 3.51 5.47l-2.04.56c-1.1-3.96-3.9-5.98-8.3-6.01-2.91.02-5.11.93-6.55 2.72-1.37 1.71-2.08 4.12-2.1 7.17.02 3.04.73 5.46 2.1 7.16 1.44 1.79 3.64 2.7 6.55 2.72 2.62-.02 4.35-.63 5.8-2.05 1.64-1.6 1.61-3.6 1.07-4.82-.31-.71-.87-1.3-1.63-1.74-.19 1.35-.6 2.41-1.22 3.17-.83 1.01-2.01 1.54-3.53 1.57-1.15.02-2.25-.26-3.09-.8-1-.64-1.59-1.59-1.66-2.68-.13-2.17 1.58-3.73 4.26-3.88.95-.05 1.84-.02 2.65.11-.1-.63-.31-1.12-.63-1.47-.43-.47-1.13-.72-2.08-.72h-.04c-.76 0-1.8.2-2.45 1.18L7.89 8.85c.95-1.43 2.41-2.21 4.19-2.21h.06c3.13.02 4.99 1.97 5.16 5.36.12.05.23.1.34.16 1.51.72 2.6 1.83 3.08 3.11.67 1.51.73 4.05-1.54 6.27-1.85 1.81-4.09 2.43-6.99 2.46Zm.14-11.23c-.26 0-.53.01-.79.02-1.53.08-2.46.75-2.41 1.67.05.89 1.03 1.5 2.36 1.47 1.36-.03 2.25-.56 2.77-1.66.3-.63.51-1.36.61-2.18-.53-.1-1.11-.16-1.75-.16Z"></path></svg></span>Threads</span>
                  <input type="checkbox" data-platform="Threads" checked>
                </div>
                <span class="badge ready">연결됨</span>
                <span class="meta-row">API 검증 필요</span>
              </label>
              <label class="platform">
                <div class="platform-header">
                  <span class="platform-name"><span class="platform-logo kakao" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M12 5c4.45 0 8 2.62 8 5.85 0 3.24-3.55 5.86-8 5.86-.55 0-1.08-.04-1.6-.12L7.2 18.7c-.32.2-.72-.1-.6-.46l.9-2.72C5.38 14.45 4 12.75 4 10.85 4 7.62 7.55 5 12 5Z"></path></svg></span>Kakao</span>
                  <input type="checkbox" data-platform="Kakao">
                </div>
                <span class="badge warning">방식 확정 필요</span>
                <span class="meta-row">Channel/Business</span>
              </label>
            </div>
          </section>

          <section class="section">
            <h2>게시 설정</h2>
            <div class="field">
              <label for="publishMode">방식</label>
              <select id="publishMode">
                <option value="now">바로 게시</option>
                <option value="scheduled">예약 게시</option>
              </select>
            </div>
            <div class="field">
              <label for="scheduledAt">예약 시간</label>
              <input id="scheduledAt" type="datetime-local">
            </div>
          </section>

          <section class="section">
            <h2>게시 결과</h2>
            <table class="result-table">
              <thead>
                <tr>
                  <th>플랫폼</th>
                  <th>상태</th>
                  <th>메시지</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr>
                  <td colspan="3">게시 전</td>
                </tr>
              </tbody>
            </table>
          </section>
        </div>

        <aside>
          <section class="section">
            <h2>미리보기</h2>
            <div class="preview" id="preview"></div>
          </section>
        </aside>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const postBody = document.querySelector("#postBody");
    const postTitle = document.querySelector("#postTitle");
    const linkUrl = document.querySelector("#linkUrl");
    const hashtags = document.querySelector("#hashtags");
    const bodyCount = document.querySelector("#bodyCount");
    const preview = document.querySelector("#preview");
    const resultBody = document.querySelector("#resultBody");
    const toast = document.querySelector("#toast");
    const platformInputs = Array.from(document.querySelectorAll("[data-platform]"));

    const state = {
      imageName: ""
    };

    function selectedPlatforms() {
      return platformInputs.filter((input) => input.checked).map((input) => input.dataset.platform);
    }

    function contentFor(platform) {
      const body = postBody.value.trim();
      const link = linkUrl.value.trim();
      const tags = hashtags.value.trim();

      if (platform === "Instagram") {
        return [body, "", tags].filter(Boolean).join("\n");
      }

      if (platform === "Threads") {
        return [body, tags].filter(Boolean).join("\n");
      }

      return [postTitle.value.trim(), body, link].filter(Boolean).join("\n");
    }

    function renderPreview() {
      bodyCount.textContent = `${postBody.value.length}자`;
      const platforms = selectedPlatforms();

      if (platforms.length === 0) {
        preview.innerHTML = '<div class="meta-row">선택된 플랫폼 없음</div>';
        return;
      }

      preview.innerHTML = platforms.map((platform) => `
        <article class="preview-item">
          <div class="preview-head">
            <span>${platform}</span>
            <span class="badge">${platform === "Kakao" ? "정책 확인" : "게시 가능"}</span>
          </div>
          <div class="preview-body">
            <div class="image-placeholder">${state.imageName || "이미지 미리보기"}</div>
            <div class="preview-text">${escapeHtml(contentFor(platform))}</div>
          </div>
        </article>
      `).join("");
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&apos;");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function renderResults(mode) {
      const rows = selectedPlatforms().map((platform) => {
        if (platform === "Kakao") {
          return `
            <tr>
              <td>${platform}</td>
              <td><span class="status failed">보류</span></td>
              <td>Kakao 공식 발송 방식 확정 후 실행</td>
            </tr>
          `;
        }

        return `
          <tr>
            <td>${platform}</td>
            <td><span class="status ${mode === "scheduled" ? "pending" : "success"}">${mode === "scheduled" ? "예약됨" : "성공"}</span></td>
            <td>${mode === "scheduled" ? "예약 게시 생성" : "테스트 어댑터 결과"}</td>
          </tr>
        `;
      });

      resultBody.innerHTML = rows.length ? rows.join("") : '<tr><td colspan="3">선택된 플랫폼 없음</td></tr>';
    }

    document.querySelector("#assetName").addEventListener("change", (event) => {
      state.imageName = event.target.files[0]?.name || "";
      renderPreview();
    });

    document.querySelector("#saveDraft").addEventListener("click", () => {
      showToast("초안이 저장되었습니다.");
    });

    document.querySelector("#schedulePost").addEventListener("click", () => {
      document.querySelector("#publishMode").value = "scheduled";
      renderResults("scheduled");
      showToast("예약 게시가 생성되었습니다.");
    });

    document.querySelector("#publishNow").addEventListener("click", () => {
      document.querySelector("#publishMode").value = "now";
      renderResults("now");
      showToast("게시 작업이 실행되었습니다.");
    });

    [postBody, postTitle, linkUrl, hashtags, ...platformInputs].forEach((element) => {
      element.addEventListener("input", renderPreview);
      element.addEventListener("change", renderPreview);
    });

    renderPreview();
  </script>
</body>
</html>
